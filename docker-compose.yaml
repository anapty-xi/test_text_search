services:
  api:
    build: ./
    image: api
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: postgres:16.0
    restart: 'always'
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "psql -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: test_text_search
      POSTGRES_PORT: 5432
    networks:
      - app-network


volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge